<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HyperDCA — Leads Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0f1a;
      color: #e5e7eb;
      min-height: 100vh;
      padding: 32px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .header .count {
      background: #1e40af;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .auth-form {
      max-width: 400px;
      margin: 80px auto;
      text-align: center;
    }
    .auth-form h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }
    .auth-form input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #374151;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      font-size: 15px;
      margin-bottom: 12px;
    }
    .auth-form button {
      width: 100%;
      padding: 12px;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .auth-form button:hover { background: #1d4ed8; }
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 20px 24px;
      min-width: 160px;
    }
    .stat-card .label { font-size: 12px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .actions button {
      padding: 8px 16px;
      border: 1px solid #374151;
      border-radius: 8px;
      background: #111827;
      color: #e5e7eb;
      font-size: 13px;
      cursor: pointer;
    }
    .actions button:hover { background: #1f2937; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #111827;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1f2937;
    }
    thead th {
      text-align: left;
      padding: 14px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      background: #0d1117;
      border-bottom: 1px solid #1f2937;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: #e5e7eb; }
    tbody tr { border-bottom: 1px solid #1f2937; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a2332; }
    td {
      padding: 12px 16px;
      font-size: 14px;
    }
    td.email { font-weight: 500; color: #93c5fd; }
    td.country { color: #d1d5db; }
    td.date { color: #9ca3af; font-size: 13px; font-variant-numeric: tabular-nums; }
    .market-tag {
      display: inline-block;
      background: #1e3a5f;
      color: #93c5fd;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      margin: 1px 2px;
    }
    .empty-tag { color: #6b7280; font-style: italic; font-size: 13px; }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.complete { background: #22c55e; }
    .status-dot.partial { background: #f59e0b; }
    #dashboard { display: none; }
    .error { color: #ef4444; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>

<div id="auth" class="auth-form">
  <h2>Leads Dashboard</h2>
  <p style="color:#9ca3af;margin-bottom:20px;font-size:14px">Enter admin password to view leads</p>
  <input type="password" id="password" placeholder="Admin secret" autofocus />
  <button onclick="login()">Access</button>
  <p id="auth-error" class="error"></p>
</div>

<div id="dashboard">
  <div class="header">
    <h1>HyperDCA Leads</h1>
    <span class="count" id="total-count">0</span>
    <span style="color:#6b7280;font-size:13px" id="last-refresh"></span>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Total leads</div>
      <div class="value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="label">With preferences</div>
      <div class="value" id="stat-complete">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Countries</div>
      <div class="value" id="stat-countries">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Top market</div>
      <div class="value" id="stat-top-market" style="font-size:16px">—</div>
    </div>
  </div>

  <div class="actions">
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="loadLeads()">Refresh</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th onclick="sortBy('email')">Email</th>
        <th onclick="sortBy('country')">Country</th>
        <th onclick="sortBy('markets')">Markets</th>
        <th>Status</th>
        <th onclick="sortBy('createdAt')">Signed up</th>
      </tr>
    </thead>
    <tbody id="leads-body"></tbody>
  </table>
</div>

<script>
var leads = [];
var secret = '';
var sortField = 'createdAt';
var sortAsc = false;

function login() {
  secret = document.getElementById('password').value;
  fetch('/api/leads?s=' + encodeURIComponent(secret))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        document.getElementById('auth-error').textContent = 'Invalid password';
        return;
      }
      document.getElementById('auth').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      leads = data.leads || [];
      render();
    })
    .catch(function() {
      document.getElementById('auth-error').textContent = 'Connection error';
    });
}

document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

function loadLeads() {
  fetch('/api/leads?s=' + encodeURIComponent(secret))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      leads = data.leads || [];
      render();
    });
}

function sortBy(field) {
  if (sortField === field) { sortAsc = !sortAsc; }
  else { sortField = field; sortAsc = true; }
  render();
}

function render() {
  var sorted = leads.slice().sort(function(a, b) {
    var va = (a[sortField] || '').toString().toLowerCase();
    var vb = (b[sortField] || '').toString().toLowerCase();
    if (sortField === 'markets') { va = (a.markets||[]).length; vb = (b.markets||[]).length; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  // Stats
  document.getElementById('stat-total').textContent = leads.length;
  document.getElementById('total-count').textContent = leads.length + ' leads';

  var complete = leads.filter(function(l) { return l.country && l.markets && l.markets.length > 0; });
  document.getElementById('stat-complete').textContent = complete.length;

  var countries = {};
  var marketCount = {};
  leads.forEach(function(l) {
    if (l.country) countries[l.country] = true;
    (l.markets || []).forEach(function(m) { marketCount[m] = (marketCount[m] || 0) + 1; });
  });
  document.getElementById('stat-countries').textContent = Object.keys(countries).length;

  var topMarket = '—';
  var topCount = 0;
  Object.keys(marketCount).forEach(function(m) {
    if (marketCount[m] > topCount) { topCount = marketCount[m]; topMarket = m; }
  });
  document.getElementById('stat-top-market').textContent = topMarket;

  document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString();

  // Table
  var html = '';
  sorted.forEach(function(lead, i) {
    var isComplete = lead.country && lead.markets && lead.markets.length > 0;
    var statusDot = isComplete ? 'complete' : 'partial';
    var statusText = isComplete ? 'Complete' : 'Email only';

    var marketsHtml = '';
    if (lead.markets && lead.markets.length > 0) {
      lead.markets.forEach(function(m) {
        marketsHtml += '<span class="market-tag">' + m + '</span>';
      });
    } else {
      marketsHtml = '<span class="empty-tag">—</span>';
    }

    var date = new Date(lead.createdAt);
    var dateStr = date.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' })
      + ' ' + date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

    html += '<tr>'
      + '<td style="color:#6b7280">' + (i + 1) + '</td>'
      + '<td class="email">' + lead.email + '</td>'
      + '<td class="country">' + (lead.country || '<span class="empty-tag">—</span>') + '</td>'
      + '<td>' + marketsHtml + '</td>'
      + '<td><span class="status-dot ' + statusDot + '"></span>' + statusText + '</td>'
      + '<td class="date">' + dateStr + '</td>'
      + '</tr>';
  });
  document.getElementById('leads-body').innerHTML = html;
}

function exportCSV() {
  var rows = [['#', 'Email', 'Country', 'Markets', 'Status', 'Signed Up']];
  leads.forEach(function(l, i) {
    var isComplete = l.country && l.markets && l.markets.length > 0;
    rows.push([
      i + 1,
      l.email,
      l.country || '',
      (l.markets || []).join('; '),
      isComplete ? 'Complete' : 'Email only',
      l.createdAt
    ]);
  });
  var csv = rows.map(function(r) {
    return r.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',');
  }).join('\n');
  var blob = new Blob([csv], { type: 'text/csv' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hyperdca-leads-' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
}
</script>
</body>
</html>
